server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app
    location / {
        try_files $uri /index.html;
    }

    # Backend API (chat, patients, logs, blacklist, tts proxy)
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
    }

    # ASR WebSocket (cache-aware streaming).
    # Resolve the upstream lazily so the frontend still boots when the GPU
    # `asr` service isn't up yet (the UI degrades to browser speech).
    location /asr {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $asr_upstream asr;
        proxy_pass http://$asr_upstream:8000/asr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
