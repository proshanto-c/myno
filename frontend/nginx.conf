server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / { try_files $uri /index.html; }

    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
    }

    # ASR WebSocket (cache-aware streaming); lazy upstream resolve.
    location /asr {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $asr_upstream asr;
        proxy_pass http://$asr_upstream:8000/asr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}

# HTTPS — needed so browsers grant microphone access over the public IP
# (self-signed cert generated at build time; click through the warning once).
server {
    listen 443 ssl;
    server_name _;
    ssl_certificate     /etc/nginx/certs/self.crt;
    ssl_certificate_key /etc/nginx/certs/self.key;
    root /usr/share/nginx/html;
    index index.html;

    location / { try_files $uri /index.html; }

    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
    }

    location /asr {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $asr_upstream asr;
        proxy_pass http://$asr_upstream:8000/asr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
